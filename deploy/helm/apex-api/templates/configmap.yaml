apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "apex-api.fullname" . }}-config
  labels:
    {{- include "apex-api.labels" . | nindent 4 }}
data:
  NODE_ENV: {{ .Values.config.nodeEnv | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  PORT: {{ .Values.config.port | quote }}
