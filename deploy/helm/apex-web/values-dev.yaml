# APEX Web - Development Environment Values
# ==============================================================================

replicaCount: 1

image:
  repository: iad.ocir.io/apex-dev/apex-web
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    memory: '64Mi'
    cpu: '50m'
  limits:
    memory: '128Mi'
    cpu: '200m'

env:
  NODE_ENV: 'development'
  NEXT_PUBLIC_API_URL: 'http://api.apex.local'
  NEXT_PUBLIC_WS_URL: 'ws://api.apex.local'
  NEXT_PUBLIC_APP_ENV: 'development'

ingress:
  enabled: true
  className: 'nginx'
  hosts:
    - host: apex.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

autoscaling:
  enabled: false

livenessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 5
  periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}
