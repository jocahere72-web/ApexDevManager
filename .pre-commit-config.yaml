# Pre-commit hooks for Harness-Driven Development
# Install: pre-commit install && pre-commit install --hook-type commit-msg
# Run manually: pre-commit run --all-files

repos:
  # Gate: No secrets in code
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  # Gate: Every commit must reference a Linear issue
  - repo: local
    hooks:
      - id: check-issue-ref
        name: Check issue reference (Refs NUE-XXX)
        entry: bash scripts/check_issue_ref.sh
        language: system
        stages: [commit-msg]

  # Code quality: ESLint
  - repo: local
    hooks:
      - id: eslint
        name: ESLint
        entry: npx eslint --fix
        language: system
        types_or: [javascript, jsx, ts, tsx]
        pass_filenames: true

  # Code quality: Prettier
  - repo: local
    hooks:
      - id: prettier
        name: Prettier
        entry: npx prettier --write
        language: system
        types_or: [javascript, jsx, ts, tsx, json, yaml, markdown, css]
        pass_filenames: true
